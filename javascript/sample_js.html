      //process data from the backend
      function processJsonData(jsonData) {
        console.log(jsonData);
        //si jsonData is object
        //access the products array from the jsonData object and store it in a variable
        let productsArray = jsonData["products"];
        products = productsArray;
        //call the function to display the product list and pass the products array as an argument
        displayProductList(productsArray);
      }

      function displayProductList(productsArray) {
        //get the product list element
        let productList = document.getElementById("productList");
        let sum = 0;
        //loop the products array and create the product cards
        for (let i = 0; i < productsArray.length; i++) {
          //productsArray[i] access the current product object in the loop
          // p is a variable that holds the current product object in the loop
          let pObject = productsArray[i];

          productList.innerHTML += `
          <div class="col-3 mb-4">
            <div class="card">
                    <div class="card-header text-center">${pObject.brand}</div>
                    <img src="${pObject.thumbnail}" class="card-img-top" alt="${pObject.title}">
                    <div class="card-body">
                    <p class="text-center">${pObject.title}</p>
                    <p class="text-center text-danger">Price: $${pObject.price}</p>

                    <div class="d-grid">
                        <button class="btn btn-secondary" onclick="addToCart('${pObject.id}')"><i class="bi bi-cart-plus"></i> Add to Cart</button>
                    </div>
                    </div>
            </div>
           </div> `;
        }
      }

      //function to add product to cart
      function addToCart(productId) {
        //add the product to the cart
        let productObject = findProductById(productId);

        let found = false;

        //check if the product is already in the cart
        for (let i = 0; i < cart.length; i++) {
          if (Number(cart[i].id) === Number(productId)) {
            cart[i].quantity += 1;
            found = true;
            break;
          }
        }

        if (!found) {
          let productObjectNaIlalagaySaCart = {
            id: productObject.id,
            title: productObject.title,
            price: productObject.price,
            quantity: 1,
          };
          cart.push(productObjectNaIlalagaySaCart);
        }

        //create Element for display
        let cartList = document.getElementById("cartList");

        cartList.innerHTML = ""; //clear the cart list before displaying the updated cart

        for (let i = 0; cart.length > i; i++) {
          let pObj = cart[i];

          let li = document.createElement("li");
          li.classList.add(
            "list-group-item",
            "d-flex",
            "justify-content-around",
            "align-items-center",
            "gap-3",
          );

          li.innerHTML = `
          <div>${pObj.title}</div>
          <span class="badge bg-primary rounded-pill">$${pObj.price}</span>
          <input type="number" value="${pObj.quantity}" min="1" class="form-control w-25 d-inline-block">
          <span class="badge bg-secondary rounded-pill">Total: $${(pObj.price * pObj.quantity).toFixed(2)}</span>
          <button class="btn btn-danger"><i class="bi bi-trash"></i></button>
        `;

          cartList.appendChild(li);
        }

      function findProductById(productId) {

        for (let i = 0; i < products.length; i++) {

            return products[i];
